<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1200"
  height="630"
  viewBox="0 0 1200 630"
  role="img"
  aria-label="Wedding invitation Open Graph card"
>
  <!-- background -->
  <rect width="1200" height="630" fill="#ffffff" />
  <!-- subtle parchment band on the right side for text breathing room -->
  <rect x="600" y="0" width="600" height="630" fill="#fafafc" />

  <!-- thin hairline divider -->
  <line x1="600" y1="80" x2="600" y2="550" stroke="#e0e0e0" stroke-width="1" />

  <!-- ============================================
       LEFT: Illustration (manual therapist + developer)
       Centered around (300, 315), scaled to fit left half.
       Inherits stroke from <g> for consistency.
       ============================================ -->
  <g
    transform="translate(60 75) scale(1.0)"
    fill="none"
    stroke="#1d1d1f"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  >
    <!-- ground line -->
    <path d="M 30 410 Q 240 422 450 410" opacity="0.3" />

    <!-- ===== LEFT FIGURE: Manual Therapist ===== -->
    <g id="og-therapist">
      <circle cx="170" cy="150" r="34" />
      <path d="M 142 138 Q 158 122 178 126 Q 195 130 200 144" />
      <path d="M 162 184 L 162 198" />
      <path d="M 178 184 L 178 198" />
      <!-- stethoscope -->
      <path d="M 156 196 Q 150 218 162 232 L 165 252" />
      <path d="M 184 196 Q 190 218 178 232 L 175 252" />
      <circle cx="170" cy="258" r="6" />
      <!-- body -->
      <path d="M 138 210 Q 142 200 162 198 L 178 198 Q 198 200 202 210
               L 212 270 Q 212 290 200 296
               L 200 380
               L 140 380
               L 140 296 Q 128 290 128 270 Z" />
      <path d="M 162 198 L 170 218 L 178 198" />
      <path d="M 184 232 L 200 232 L 200 250 L 184 250 Z" />
      <path d="M 138 218 Q 120 240 130 270 Q 140 290 175 300" />
      <path d="M 202 218 Q 220 240 218 274 Q 216 296 208 312" />
      <circle cx="180" cy="304" r="9" />
      <path d="M 158 380 L 156 444" />
      <path d="M 182 380 L 184 444" />
      <path d="M 144 444 Q 150 452 168 448 L 170 442" />
      <path d="M 196 444 Q 190 452 172 448 L 170 442" />
    </g>

    <!-- ===== RIGHT FIGURE: Backend Developer ===== -->
    <g id="og-developer">
      <circle cx="320" cy="150" r="34" />
      <circle cx="310" cy="152" r="7" />
      <circle cx="332" cy="152" r="7" />
      <path d="M 317 152 L 325 152" />
      <path d="M 290 132 Q 310 116 332 122 Q 348 128 350 142" />
      <path d="M 312 184 L 312 198" />
      <path d="M 328 184 L 328 198" />
      <path d="M 286 212 Q 290 200 312 198 L 328 198 Q 350 200 354 212
               L 362 274 Q 362 292 350 298
               L 350 380
               L 290 380
               L 290 298 Q 278 292 278 274 Z" />
      <path d="M 314 200 L 312 224" />
      <path d="M 326 200 L 328 224" />
      <circle cx="312" cy="226" r="1.8" fill="#1d1d1f" stroke="none" />
      <circle cx="328" cy="226" r="1.8" fill="#1d1d1f" stroke="none" />
      <path d="M 300 200 Q 320 188 340 200" />
      <path d="M 286 220 Q 270 244 278 274 Q 286 296 305 304" />
      <circle cx="300" cy="304" r="9" />
      <path d="M 354 220 Q 372 240 374 268 L 370 290" />
      <!-- laptop -->
      <g transform="translate(338 290)">
        <rect x="0" y="0" width="56" height="34" rx="2" />
        <path d="M -4 34 L 60 34 L 56 38 L 0 38 Z" />
        <path d="M 8 10 L 22 10" stroke-width="2" />
        <path d="M 8 18 L 32 18" stroke-width="2" />
        <path d="M 8 26 L 18 26" stroke-width="2" />
      </g>
      <path d="M 308 380 L 306 444" />
      <path d="M 332 380 L 334 444" />
      <path d="M 294 444 Q 300 452 318 448 L 320 442" />
      <path d="M 346 444 Q 340 452 322 448 L 320 442" />
    </g>

    <!-- bridging line between hands -->
    <path d="M 188 304 Q 240 310 292 304" />

    <!-- floating heart (the single Action Blue accent) -->
    <g transform="translate(240 232)">
      <path
        d="M 0 8
           C 0 -2, -10 -8, -16 -2
           C -22 -8, -32 -2, -32 8
           C -32 18, -16 30, 0 42
           C 16 30, 32 18, 32 8
           C 32 -2, 22 -8, 16 -2
           C 10 -8, 0 -2, 0 8 Z"
        fill="#0066cc"
        stroke="none"
        transform="scale(0.7)"
      />
    </g>

    <!-- subtle code brackets near developer -->
    <g opacity="0.5">
      <path d="M 410 232 Q 402 240 402 252 Q 402 264 410 272" stroke-width="2" />
      <path d="M 426 230 L 426 274" stroke-width="2" stroke-dasharray="3 5" />
    </g>

    <!-- subtle sparkle near therapist -->
    <g opacity="0.5">
      <path d="M 80 230 L 80 244" stroke-width="2" />
      <path d="M 73 237 L 87 237" stroke-width="2" />
    </g>
  </g>

  <!-- ============================================
       RIGHT: Text block
       ============================================ -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Pretendard', system-ui, sans-serif">
    <!-- eyebrow -->
    <text
      x="660"
      y="160"
      fill="#7a7a7a"
      font-size="20"
      font-weight="600"
      letter-spacing="2"
    >
      WEDDING INVITATION
    </text>

    <!-- headline (2 lines) -->
    <text
      x="660"
      y="240"
      fill="#1d1d1f"
      font-size="44"
      font-weight="600"
      letter-spacing="-1.6"
    >
      서로 다른 길을 걷던
    </text>
    <text
      x="660"
      y="296"
      fill="#1d1d1f"
      font-size="44"
      font-weight="600"
      letter-spacing="-1.6"
    >
      두 사람이,
    </text>
    <text
      x="660"
      y="370"
      fill="#1d1d1f"
      font-size="44"
      font-weight="600"
      letter-spacing="-1.6"
    >
      같은 방향을 바라보기로
    </text>
    <text
      x="660"
      y="426"
      fill="#1d1d1f"
      font-size="44"
      font-weight="600"
      letter-spacing="-1.6"
    >
      했습니다.
    </text>

    <!-- divider -->
    <line x1="660" y1="478" x2="720" y2="478" stroke="#1d1d1f" stroke-width="2" />

    <!-- couple line -->
    <text
      x="660"
      y="518"
      fill="#1d1d1f"
      font-size="22"
      font-weight="400"
      letter-spacing="-0.4"
    >
      <tspan font-weight="600">신랑</tspan>
      <tspan dx="14" fill="#7a7a7a">&amp;</tspan>
      <tspan dx="14" font-weight="600">신부</tspan>
    </text>

    <!-- date line -->
    <text
      x="660"
      y="552"
      fill="#7a7a7a"
      font-size="18"
      font-weight="400"
      letter-spacing="-0.2"
    >
      2027.01.31 일요일 오후 2시 30분
    </text>
  </g>
</svg>
